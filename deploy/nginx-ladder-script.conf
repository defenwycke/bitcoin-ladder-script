# /etc/nginx/sites-available/ladder-script
#
# Nginx vhost for ladder-script.org — the neutral, project-specific
# home for Ladder Script and QABIO. Serves the labs tree (engine,
# playground, docs, block-docs) and reverse-proxies the signet RPC
# through /api/ladder/* to the same backend bitcoinghost.org uses.
#
# Deployment procedure (see deploy/cutover-ladder-script.sh):
#   1. Obtain TLS cert via certbot:
#        sudo certbot --nginx -d ladder-script.org -d www.ladder-script.org
#   2. Copy this file to /etc/nginx/sites-available/ladder-script and
#      symlink to /etc/nginx/sites-enabled/
#   3. Sync the labs tree to /var/www/ladder-script/ via rsync
#   4. sudo nginx -t && sudo systemctl reload nginx
#
# The proxy location block points at the same upstream
# (ghost-labs signet node at 85.9.213.194:8340) as the existing
# bitcoinghost.org/api/ladder/ — no backend changes needed, just a new
# public-facing front door. CORS policy on the backend proxy already
# allows any origin via the * wildcard.

limit_req_zone $binary_remote_addr zone=ladder_script_api:10m rate=300r/m;

server {
    server_name ladder-script.org www.ladder-script.org;
    root /var/www/ladder-script;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ =404;
    }

    # Ladder Script signet proxy — same upstream as bitcoinghost.org,
    # independent rate-limit zone so traffic on one domain cannot
    # starve the other.
    location /api/ladder/ {
        limit_req zone=ladder_script_api burst=60 nodelay;
        limit_except GET POST {
            deny all;
        }
        client_max_body_size 256k;
        proxy_pass http://85.9.213.194:8340;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # No cache for HTML — playground and engine change often
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # TLS (filled in by certbot after running `sudo certbot --nginx`)
    # listen [::]:443 ssl ipv6only=on;
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/ladder-script.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ladder-script.org/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    listen 80;
    listen [::]:80;
}

