<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TX_MLSC Transaction Lifecycle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
  --nblue:#00d4ff;--ngreen:#00ff88;--npurple:#b366ff;--norange:#ff8800;
  --npink:#ff4488;--nyellow:#ffdd00;--nred:#ff2244;--ncyan:#00ffcc;
}
body{background:#000;color:#fff;font-family:var(--sans);min-height:100vh}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.94);backdrop-filter:blur(10px);border-bottom:1px solid #1a1a1a;display:flex;align-items:center;height:46px;padding:0 1rem;gap:.75rem}
.logo{font-family:var(--mono);font-size:.78rem;font-weight:700;color:#444;letter-spacing:.1em;white-space:nowrap}
.logo b{color:var(--nblue)}
.act-tabs{display:flex;gap:1px}
.act-tab{padding:.3rem .7rem;font-family:var(--mono);font-size:.58rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;border:none;background:none;color:#444;cursor:pointer;transition:.15s;white-space:nowrap}
.act-tab:hover{color:#888}
.act-tab.on{color:var(--nblue)}
.act-tab[data-a="1"].on{color:var(--ngreen)}
.act-tab[data-a="2"].on{color:var(--norange)}
.progress{flex:1;height:2px;background:#111;border-radius:1px;margin:0 .5rem;position:relative}
.progress-fill{height:100%;border-radius:1px;transition:width .3s;background:var(--nblue)}
.nr{margin-left:auto;display:flex;align-items:center;gap:.4rem}
.nr button{width:28px;height:28px;border-radius:5px;border:1px solid #222;background:transparent;color:#fff;font-family:var(--mono);font-size:.85rem;cursor:pointer;transition:.12s}
.nr button:hover{border-color:#444;background:#111}
.nr button:disabled{opacity:.12;cursor:default}
.nr .ct{font-family:var(--mono);font-size:.6rem;color:#444;min-width:48px;text-align:center}

/* MAIN */
.main{max-width:880px;margin:0 auto;padding:1.75rem 1.5rem 3rem}
.scene{display:none;animation:fin .4s ease}.scene.on{display:block}
@keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1}}

/* TITLES */
.act-label{font-family:var(--mono);font-size:.66rem;color:#333;letter-spacing:.12em;text-transform:uppercase;margin-bottom:.25rem}
.title{font-family:var(--mono);font-size:1.14rem;font-weight:700;color:#fff;margin-bottom:.15rem}
.sub{font-family:var(--mono);font-size:.74rem;color:#555;margin-bottom:1.5rem;letter-spacing:.03em}

/* ENGINE-STYLE LADDER */
.eng-ladder{margin:1rem 0;font-family:var(--mono)}
.eng-rung{display:flex;align-items:center;margin-bottom:6px;min-height:52px;position:relative}
.eng-rail{width:3px;height:52px;flex-shrink:0}
.eng-rail-l{background:#333}
.eng-rail-r{background:#333}
.eng-wire{flex:1;height:2px;background:#2a2a2a}
.eng-wire.hot{background:var(--norange);box-shadow:0 0 4px rgba(255,136,0,.3)}
.eng-contact{display:flex;align-items:center;flex-shrink:0;height:40px;cursor:default}
.eng-bracket{font-size:15px;color:#444;line-height:40px;user-select:none}
.eng-contact.hot .eng-bracket{color:var(--norange)}
.eng-body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:80px;height:38px;padding:0 8px;background:#0d0d0d;border:1px solid #222;border-top-width:2px;transition:.2s}
.eng-body .eng-type{font-size:11px;font-weight:600;color:#888;letter-spacing:.5px}
.eng-body .eng-val{font-size:9px;color:#555;white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis}
.eng-contact.hot .eng-body{background:#1a1200;border-color:#ff880040;box-shadow:inset 0 0 12px rgba(255,136,0,.06)}
.eng-contact.hot .eng-type{color:var(--norange)}
.eng-contact.hot .eng-val{color:#bb6600}
.eng-coil{display:flex;align-items:center;height:40px;flex-shrink:0;gap:2px;cursor:default}
.eng-coil-sym{font-size:14px;color:#444}
.eng-coil.hot .eng-coil-sym{color:var(--norange);text-shadow:0 0 6px rgba(255,136,0,.3)}
.eng-coil-name{font-size:9px;color:#555;font-weight:600}
.eng-coil.hot .eng-coil-name{color:var(--norange)}
.eng-rung-num{position:absolute;left:-36px;font-size:10px;color:#333;letter-spacing:1px;text-align:right;width:30px}
.eng-or{text-align:center;font-size:10px;color:#333;padding:2px 0;letter-spacing:2px}

/* LEGACY LADDER VIS (simple) */
.ladder{position:relative;padding:1.5rem 0 1rem 80px}
.ladder-rail{position:absolute;left:36px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--nblue),var(--npurple),var(--ngreen))}
.rung-vis{position:relative;margin-bottom:1.5rem;padding-left:1.5rem}
.rung-vis::before{content:'';position:absolute;left:-44px;top:18px;width:44px;height:2px}
.rung-vis.r0::before{background:var(--nblue)}
.rung-vis.r1::before{background:var(--npurple)}
.rung-vis .rung-label{font-family:var(--mono);font-size:.84rem;font-weight:700;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.rung-vis.r0 .rung-label{color:var(--nblue)}
.rung-vis.r1 .rung-label{color:var(--npurple)}
.or-badge{font-family:var(--mono);font-size:.66rem;color:#555;border:1px solid #333;padding:1px 6px;border-radius:3px;margin-left:auto}
.block-chip{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .7rem;border-radius:5px;font-family:var(--mono);font-size:.84rem;font-weight:600;margin-right:.4rem;margin-bottom:.3rem}
.block-chip.sig{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);color:var(--nblue)}
.block-chip.csv{background:rgba(179,102,255,.06);border:1px solid rgba(179,102,255,.2);color:var(--npurple)}
.block-chip.coil{background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2);color:var(--ngreen)}
.and-pill{font-size:.6rem;color:#555;padding:0 .3rem}
.coil-vis{position:relative;margin-top:1rem;padding-left:1.5rem}
.coil-vis::before{content:'';position:absolute;left:-44px;top:14px;width:44px;height:2px;background:var(--ngreen)}

/* CARD */
.card{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:1rem;margin-bottom:.75rem;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:3px 0 0 3px}
.card.blue::before{background:var(--nblue)}.card.purple::before{background:var(--npurple)}.card.green::before{background:var(--ngreen)}.card.orange::before{background:var(--norange)}.card.pink::before{background:var(--npink)}
.card-t{font-family:var(--mono);font-size:.9rem;font-weight:600;color:#fff;margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem}
.badge{font-size:.66rem;padding:2px 6px;border-radius:3px;font-weight:500}

/* FIELD SLOT */
.fs{display:flex;align-items:stretch;margin-bottom:2px;border-radius:3px;overflow:hidden;min-height:44px}
.fs-l{width:110px;flex-shrink:0;padding:.5rem .6rem;font-family:var(--mono);font-size:.74rem;font-weight:600;display:flex;align-items:center}
.fs-m{flex:1;padding:.5rem .7rem;background:#080808;font-family:var(--mono);font-size:.78rem;display:flex;flex-direction:column;justify-content:center;gap:.15rem}
.fs-r{width:160px;flex-shrink:0;padding:.5rem .6rem;font-family:var(--mono);font-size:.67rem;display:flex;align-items:center;gap:.25rem;border-left:1px solid #1a1a1a}
.fs .hex{color:var(--npurple);word-break:break-all}
.fs .note{color:#444;font-size:.67rem}
.fs .arrow{color:var(--ngreen);font-size:.85rem}
.fs .action{color:var(--ncyan);line-height:1.3}

/* CONSTRAINT */
.cst{display:inline-block;font-family:var(--mono);font-size:.6rem;padding:1px 5px;border-radius:2px;margin-left:.3rem}
.cst.ok{background:rgba(0,255,136,.06);color:var(--ngreen);border:1px solid rgba(0,255,136,.15)}
.cst.no{background:rgba(255,34,68,.06);color:var(--nred);border:1px solid rgba(255,34,68,.15)}

/* SERIAL VIEW */
.sv{background:#050505;border:1px solid #1a1a1a;border-radius:5px;padding:.8rem .9rem;margin:.5rem 0;font-family:var(--mono);font-size:.82rem;line-height:2}
.sv .lbl{font-size:.66rem;color:#333;display:block;margin-bottom:.2rem;letter-spacing:.04em;text-transform:uppercase}
.b{display:inline-block;padding:1px 3px;border-radius:2px;margin:1px}
.b.s{background:rgba(0,212,255,.05);color:var(--nblue)}
.b.v{background:rgba(0,255,136,.05);color:var(--ngreen)}
.b.k{background:rgba(255,68,136,.05);color:var(--npink)}
.b.d{color:#333}
.bn{color:#333;font-size:.66rem;margin-left:.2rem}

/* HASH ARROW */
.ha{text-align:center;padding:.5rem 0}
.ha .fn{font-family:var(--mono);font-size:.72rem;color:#333}
.ha .ar{font-size:1.6rem;color:var(--npurple);text-shadow:0 0 10px var(--npurple)}

/* LEAF */
.leaf{background:#0a0a0a;border-radius:7px;padding:.9rem 1rem;margin:.5rem 0;position:relative}
.leaf::before{content:'';position:absolute;inset:0;border-radius:7px;padding:1px;background:linear-gradient(135deg,var(--ngreen),var(--nblue),var(--npurple));-webkit-mask:linear-gradient(#fff 0 0)content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.leaf .n{font-family:var(--mono);font-size:.78rem;color:var(--ngreen);font-weight:600;margin-bottom:.15rem}
.leaf .h{font-family:var(--mono);font-size:1rem;color:#fff;font-weight:700;text-shadow:0 0 15px rgba(0,255,136,.15)}
.leaf .g{font-family:var(--mono);font-size:.7rem;color:var(--npurple);margin-top:.3rem;opacity:.75}

/* TREE SVG */
.tree{padding:1.5rem 0;text-align:center}
.tree svg{width:100%;max-width:700px}
.tree svg text{font-family:'JetBrains Mono',monospace}

/* OUTPUT */
.out{text-align:center;padding:1.75rem;margin:.75rem 0;border:1px solid var(--ngreen);border-radius:8px;background:rgba(0,255,136,.015);box-shadow:0 0 30px rgba(0,255,136,.03)}
.out .pre{font-family:var(--mono);font-size:.6rem;color:#444;margin-bottom:.3rem}
.out .val{font-family:var(--mono);font-size:1.3rem;font-weight:700;color:var(--ngreen);text-shadow:0 0 15px rgba(0,255,136,.25);margin-bottom:.3rem}
.out .sz{font-family:var(--mono);font-size:.65rem;color:#444}
.out .msg{margin-top:.75rem;font-size:.96rem;line-height:1.6;color:#ccc}
.out .msg strong{color:var(--nyellow)}

/* CHECK */
.chk{display:flex;align-items:center;gap:.4rem;padding:.2rem 0;font-family:var(--mono);font-size:.72rem}
.chk.ok{color:var(--ngreen)}.chk.no{color:var(--nred)}
.chk .ic{width:13px;height:13px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:700;flex-shrink:0}
.chk.ok .ic{background:rgba(0,255,136,.08);border:1px solid rgba(0,255,136,.2)}
.chk.no .ic{background:rgba(255,34,68,.08);border:1px solid rgba(255,34,68,.2)}

/* CALLOUT */
.co{border-left:2px solid var(--norange);background:rgba(255,136,0,.02);padding:.7rem .9rem;margin:.5rem 0;font-size:.86rem;color:var(--norange);line-height:1.5;font-family:var(--mono)}

/* STAGE */
.stg{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:1rem;margin-bottom:.6rem}
.stg-h{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.stg-n{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:.6rem;font-weight:700;flex-shrink:0}
.stg-t{font-family:var(--mono);font-size:.86rem;font-weight:600;color:#fff}

/* DESC */
.desc{font-size:.94rem;line-height:1.6;color:#aaa;margin-bottom:.75rem}
.desc code{font-family:var(--mono);font-size:.82rem;color:var(--ncyan);background:rgba(0,255,204,.04);padding:1px 4px;border-radius:2px}
.desc strong{color:#fff}

/* RESULT */
.result{text-align:center;padding:1.5rem;border-radius:8px;margin:.75rem 0;border:1px solid var(--ngreen);background:rgba(0,255,136,.015);box-shadow:0 0 30px rgba(0,255,136,.04)}
.result h3{font-family:var(--mono);font-size:1.2rem;color:var(--ngreen);text-shadow:0 0 12px rgba(0,255,136,.25);margin-bottom:.3rem}
.result p{color:#ccc;font-size:.9rem}
.result .dim{color:#444;font-size:.78rem;margin-top:.25rem}

/* UTXO/BLOCKCHAIN */
.where-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin:.75rem 0}
.where-box{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:1rem;text-align:center}
.where-box .wt{font-family:var(--mono);font-size:.74rem;color:#444;margin-bottom:.3rem;letter-spacing:.06em;text-transform:uppercase}
.where-box .wv{font-family:var(--mono);font-size:1rem;font-weight:600;margin-bottom:.2rem}
.where-box .ws{font-family:var(--mono);font-size:.72rem;color:#444}

@media(max-width:700px){.fs-r{display:none}.fs-l{width:80px}.where-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav>
  <div class="logo"><b>Ladder</b> Script</div>
  <div class="act-tabs" id="atabs"></div>
  <div class="progress"><div class="progress-fill" id="pbar"></div></div>
  <div class="nr">
    <button id="pb" onclick="prev()">&#8592;</button>
    <span class="ct" id="ct"></span>
    <button id="nb" onclick="next()">&#8594;</button>
  </div>
</nav>

<div class="main" id="root"></div>

<script>
const S = [

// ============================================================================
// ACT 0: WHAT IS TX_MLSC
// ============================================================================

{act:0,t:"WHAT IS A LADDER?",s:"Rungs (OR) / Blocks (AND) / Coil",h:`
<div class="desc">A <strong>Ladder Script</strong> transaction locks funds behind a <strong>ladder</strong> of spending conditions. The ladder has <strong>rungs</strong> -- each rung is an independent spending path. Within each rung are <strong>blocks</strong> -- each block is a single condition (signature, timelock, hash lock, etc).</div>
<div class="card blue">
<div class="card-t">Logic Rules</div>
<div class="desc" style="margin-bottom:0">
<strong style="color:var(--nblue)">Between rungs: OR</strong> -- any one rung can spend the output.<br>
<strong style="color:var(--npurple)">Within a rung: AND</strong> -- every block in the rung must be satisfied.<br>
<strong style="color:var(--ngreen)">Coil</strong> -- output metadata: coil_type, attestation, scheme, output_index. Each rung carries its own coil specifying which output it controls.
</div>
</div>
<div class="desc" style="font-size:.72rem;color:#555">The spender reveals only the rung they use. All other rungs stay hidden behind SHA-256 proof hashes -- permanently concealed. This is the PLC model: one program, multiple output coils.</div>
`},

{act:0,t:"TX_MLSC: ONE TREE PER TX",s:"Transaction-level Merkelised Ladder Script Conditions",h:`
<div class="desc">TX_MLSC is <strong>transaction-level</strong> commitment. Instead of one Merkle tree per output, the entire transaction shares a <strong>single conditions_root</strong>. Every rung becomes a leaf. Each rung's coil has an <code>output_index</code> field that binds it to a specific output.</div>
<div class="card green">
<div class="card-t">The PLC Model</div>
<div class="desc" style="margin-bottom:0">
Think of a PLC (Programmable Logic Controller): <strong>one program</strong>, multiple <strong>output coils</strong>.<br><br>
A TX_MLSC transaction is the program. Each rung is a logic path. Each rung's coil fires a specific output via <code>output_index</code>. Multiple rungs can target the same output (OR paths), and different rungs can target different outputs within a single transaction.
</div>
</div>
<div class="desc" style="font-size:.72rem;color:#555">Outputs store only 8 bytes (value). The shared 32-byte conditions_root lives at the transaction level. Total on-chain footprint: ~112 bytes regardless of conditions complexity.</div>
`},

{act:0,t:"THE LEAF FORMULA",s:"TaggedHash('LadderLeaf', structural_template || value_commitment)",h:`
<div class="desc">Each rung becomes a <strong>leaf</strong> via a two-part hash. The <strong>structural template</strong> (block types, inversion flags, coil metadata) is public and validated at creation time. The <strong>value commitment</strong> (field values + pubkeys) is an opaque SHA-256 digest.</div>
<div class="sv">
<span class="lbl">Leaf = TaggedHash("LadderLeaf", template || value_commitment)</span>
<span class="b s">structural_template</span><span class="bn">block types + inverted flags + coil (~10 bytes)</span><br>
<span class="b v">value_commitment</span><span class="bn">SHA256(field_values || pubkeys) -- 32 bytes, opaque</span>
</div>
<div class="card purple">
<div class="card-t">Why Two Parts?</div>
<div class="desc" style="margin-bottom:0;font-size:.82rem">
<strong style="color:var(--nblue)">Structural template</strong> -- validated at block acceptance. The node checks: are the block types known? Are inversion flags valid? Does output_index exist? This prevents invalid conditions from entering the UTXO set.<br><br>
<strong style="color:var(--npurple)">Value commitment</strong> -- opaque at creation. A SHA-256 hash output, not attacker-chosen data. The actual field values and pubkeys are revealed only at spend time.
</div>
</div>
`},

{act:0,t:"CREATION PROOF",s:"Witness data validated at block acceptance, prunable afterward",h:`
<div class="desc">The <strong>creation proof</strong> is carried in the transaction witness. It contains the structural templates and value commitments for every rung. Nodes validate it at block acceptance -- checking block types, coils, output coverage, and root match -- then it can be pruned (it's witness data).</div>
<div class="card orange">
<div class="card-t">CreationProof Structure</div>
<div class="sv" style="margin:0;border:none;padding:.4rem 0">
<span class="b s">n_rungs</span><span class="bn">CompactSize</span><br>
for each rung:<br>
&nbsp;&nbsp;<span class="b s">n_blocks</span><span class="bn">uint8</span><br>
&nbsp;&nbsp;per block: <span class="b v">block_type</span><span class="bn">uint16 LE</span> + <span class="b v">inverted</span><span class="bn">uint8</span><br>
&nbsp;&nbsp;<span class="b v">coil_type</span> <span class="b v">attestation</span> <span class="b v">scheme</span> <span class="b v">output_index</span> <span class="b v">has_address</span><br>
&nbsp;&nbsp;<span class="b k">value_commitment</span><span class="bn">32 bytes -- SHA256(fields || pubkeys)</span>
</div>
</div>
<div class="desc" style="font-size:.72rem;color:#555">ValidateCreationProof() checks: known block types, valid inversion, valid coil types, output_index &lt; n_outputs, every output has at least one rung, and computed root matches the transaction's conditions_root.</div>
`},

{act:0,t:"THE QUANTUM VAULT",s:"Rung 0 (Schnorr) / Rung 1 (FALCON512 + CSV) -- same output",h:`
<div class="desc">Throughout this walkthrough we'll trace a <strong>quantum vault</strong> -- two spending paths targeting the same output. The coil at the end of each rung fires when all blocks on that rung are satisfied.</div>

<div class="eng-ladder">
  <div style="font-family:var(--mono);font-size:11px;color:#444;margin-bottom:8px;letter-spacing:1px">RUNG 0 -- PRIMARY (output_index: 0)</div>
  <div class="eng-rung">
    <div class="eng-rail eng-rail-l"></div>
    <div class="eng-wire"></div>
    <div class="eng-contact">
      <span class="eng-bracket">--&#9508;</span>
      <div class="eng-body" style="border-top-color:var(--nblue)">
        <span class="eng-type" style="color:var(--nblue)">SIG</span>
        <span class="eng-val">Schnorr key A</span>
      </div>
      <span class="eng-bracket">&#9500;--</span>
    </div>
    <div class="eng-wire"></div>
    <div class="eng-coil"><span class="eng-coil-sym">( )</span><span class="eng-coil-name">OUT 0</span></div>
    <div class="eng-wire" style="width:8px"></div>
    <div class="eng-rail eng-rail-r"></div>
  </div>

  <div class="eng-or">OR</div>

  <div style="font-family:var(--mono);font-size:11px;color:#444;margin-bottom:8px;letter-spacing:1px">RUNG 1 -- RECOVERY (output_index: 0)</div>
  <div class="eng-rung">
    <div class="eng-rail eng-rail-l"></div>
    <div class="eng-wire"></div>
    <div class="eng-contact">
      <span class="eng-bracket">--&#9508;</span>
      <div class="eng-body" style="border-top-color:var(--npurple)">
        <span class="eng-type" style="color:var(--npurple)">SIG</span>
        <span class="eng-val">FALCON512 key D</span>
      </div>
      <span class="eng-bracket">&#9500;--</span>
    </div>
    <div class="eng-wire"></div>
    <div class="eng-contact">
      <span class="eng-bracket">--&#9508;</span>
      <div class="eng-body" style="border-top-color:var(--npurple)">
        <span class="eng-type" style="color:var(--npurple)">CSV</span>
        <span class="eng-val">1008 blocks</span>
      </div>
      <span class="eng-bracket">&#9500;--</span>
    </div>
    <div class="eng-wire"></div>
    <div class="eng-coil"><span class="eng-coil-sym">( )</span><span class="eng-coil-name">OUT 0</span></div>
    <div class="eng-wire" style="width:8px"></div>
    <div class="eng-rail eng-rail-r"></div>
  </div>
</div>

<div class="desc" style="margin-top:1rem;font-size:.82rem;color:#555"><strong style="color:var(--nblue)">Rung 0:</strong> 1 block (SIG Schnorr) -- everyday spending. Coil output_index = 0.<br><strong style="color:var(--npurple)">Rung 1:</strong> 2 blocks (SIG FALCON512 <strong style="color:#555">AND</strong> CSV 1008) -- quantum-safe recovery after ~1 week. Coil output_index = 0.<br><strong style="color:var(--ngreen)">Both rungs target output 0</strong> -- the PLC model: two paths, one output.</div>
`},

// ============================================================================
// ACT 1: FUND (CREATE TRANSACTION)
// ============================================================================

{act:1,t:"TRANSACTION SHELL",s:"createtxmlsc RPC / version 4 / flag 0x02",h:`
<div class="desc">The user calls <code>createtxmlsc</code>. The system creates a <code>CMutableTransaction</code> with <strong>version = 4</strong> (RUNG_TX_VERSION). TX_MLSC format uses flag byte <code>0x02</code>. One shared <code>conditions_root</code> per transaction. Outputs are 8 bytes each (value only).</div>
<div class="sv">
<span class="lbl">Transaction skeleton</span>
<span class="b s">version</span><span class="bn">= 4 (RUNG_TX_VERSION)</span><br>
<span class="b s">flag</span><span class="bn">= 0x02 (TX_MLSC format)</span><br>
<span class="b s">vin[]</span><span class="bn">input outpoints (txid + vout + sequence)</span><br>
<span class="b s">vout[]</span><span class="bn">each output: 8 bytes (value only)</span><br>
<span class="b v">conditions_root</span><span class="bn">32 bytes -- shared across all outputs</span><br>
<span class="b k">creation_proof</span><span class="bn">witness -- templates + value_commitments</span><br>
<span class="b s">nLockTime</span><span class="bn">optional, default 0</span>
</div>
`},

{act:1,t:"RUNG 0 -- BLOCK TYPE PARSING",s:'ParseBlockType("SIG") -> 0x0001',h:`
<div class="desc">User specifies <code>{"type": "SIG"}</code>. The string is mapped to <code>RungBlockType::SIG</code> (0x0001).</div>
<div class="card blue">
<div class="card-t">Checks</div>
<div class="chk ok"><span class="ic">&#10003;</span> ParseBlockType("SIG") -> RungBlockType::SIG (0x0001)</div>
<div class="chk ok"><span class="ic">&#10003;</span> IsKnownBlockType(0x0001) = true</div>
<div class="chk ok"><span class="ic">&#10003;</span> No "inverted" flag -- default false</div>
<div class="chk ok"><span class="ic">&#10003;</span> IsKeyConsumingBlockType(SIG) = true -- SIG consumes 1 pubkey</div>
<div class="chk ok"><span class="ic">&#10003;</span> IsInvertibleBlockType(SIG) = false -- key-consuming blocks can NEVER be inverted</div>
</div>
<div class="co">If user tried "inverted": true on SIG, it would be rejected. This prevents garbage-pubkey data embedding via inversion (fail -> invert -> SATISFIED).</div>
`},

{act:1,t:"RUNG 0 -- PUBKEY INTERCEPT",s:"merkle_pub_key: pubkey collected, NOT stored in conditions",h:`
<div class="desc">User provides a 33-byte compressed secp256k1 pubkey. Because <code>conditions_only = true</code> and the field type is PUBKEY, the system does NOT add it to the block's fields. The raw pubkey bytes are collected into a separate vector.</div>
<div class="fs" style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:4px">
  <div class="fs-l" style="color:var(--npink)">PUBKEY</div>
  <div class="fs-m">
    <div class="hex">02a3f2c8...8d01b7e5</div>
    <div class="note">33 bytes -- compressed secp256k1</div>
  </div>
  <div class="fs-r">
    <span class="arrow">&#8594;</span>
    <span class="action">INTERCEPTED<br>-> rung_pubkeys[0]<br>NOT in block.fields</span>
  </div>
</div>
<div class="co">Why? There is no PUBKEY_COMMIT field in conditions. The pubkey will be folded into the value_commitment hash. No writable 32-byte pubkey slot exists for an attacker to stuff arbitrary data into.</div>
`},

{act:1,t:"RUNG 0 -- SCHEME FIELD",s:"1 byte / SCHNORR / stored in conditions",h:`
<div class="desc">User provides <code>{"type": "SCHEME", "hex": "01"}</code> (SCHNORR). Unlike PUBKEY, the SCHEME field IS stored in the block's fields -- it's a condition data type.</div>
<div class="fs" style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:4px">
  <div class="fs-l" style="color:var(--ncyan)">SCHEME</div>
  <div class="fs-m">
    <div class="hex">01</div>
    <div class="note">1 byte -- SCHNORR</div>
  </div>
  <div class="fs-r">
    <span class="arrow">&#8594;</span>
    <span class="action">STORED<br>in block.fields</span>
  </div>
</div>
<div class="card green" style="margin-top:.5rem">
<div class="card-t">Validation</div>
<div class="chk ok"><span class="ic">&#10003;</span> IsConditionDataType(SCHEME) = true</div>
<div class="chk ok"><span class="ic">&#10003;</span> IsKnownScheme(0x01) = true -- SCHNORR</div>
</div>
<div class="desc" style="font-size:.72rem;color:#555;margin-top:.5rem">Valid schemes: SCHNORR (0x01), ECDSA (0x02), FALCON512 (0x10), FALCON1024 (0x11), DILITHIUM3 (0x12), SPHINCS_SHA (0x13).</div>
`},

{act:1,t:"PUBKEY_COMMIT REJECTION",s:"If someone tries to use PUBKEY_COMMIT...",h:`
<div class="desc">What happens if a user (or attacker via RPC) tries <code>{"type": "PUBKEY_COMMIT", "hex": "..."}</code>?</div>
<div class="card" style="border-color:rgba(255,34,68,.2)">
<div class="card-t" style="color:var(--nred)">Two rejection layers</div>
<div class="chk no"><span class="ic">&#10007;</span> RPC layer: ParseDataType("PUBKEY_COMMIT") throws JSONRPCError -- "PUBKEY_COMMIT is no longer a condition field"</div>
<div class="chk no"><span class="ic">&#10007;</span> Consensus layer: IsConditionDataType(PUBKEY_COMMIT) returns false -- deserialization rejects it</div>
</div>
<div class="desc" style="margin-top:.5rem;font-size:.72rem;color:#555">Even someone crafting a raw transaction and bypassing the RPC entirely cannot use PUBKEY_COMMIT -- the consensus deserialization checks every field against <code>IsConditionDataType()</code> and rejects PUBKEY_COMMIT at the protocol level.</div>
`},

{act:1,t:"RUNG 1 -- PQ KEY + CSV",s:"FALCON512 (897 bytes) + CSV (NUMERIC 1008)",h:`
<div class="desc">Rung 1 has two blocks: a SIG block with a FALCON512 key, and a CSV timelock.</div>
<div class="fs" style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:4px;margin-bottom:2px">
  <div class="fs-l" style="color:var(--npink)">PUBKEY</div>
  <div class="fs-m">
    <div class="hex">d41a...f702</div>
    <div class="note">897 bytes -- FALCON-512 <span class="cst ok">1 &le; 897 &le; 2048 &#10003;</span></div>
  </div>
  <div class="fs-r"><span class="arrow">&#8594;</span><span class="action">INTERCEPTED<br>-> rung_pubkeys[1]</span></div>
</div>
<div class="fs" style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:4px;margin-bottom:2px">
  <div class="fs-l" style="color:var(--ncyan)">SCHEME</div>
  <div class="fs-m">
    <div class="hex">10</div>
    <div class="note">FALCON512 <span class="cst ok">IsKnownScheme &#10003;</span></div>
  </div>
  <div class="fs-r"><span class="arrow">&#8594;</span><span class="action">STORED</span></div>
</div>
<div class="fs" style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:4px">
  <div class="fs-l" style="color:var(--nyellow)">NUMERIC</div>
  <div class="fs-m">
    <div class="hex">F0 03</div>
    <div class="note">2 bytes LE = 1008 blocks (~1 week) <span class="cst ok">CSV block &#10003;</span></div>
  </div>
  <div class="fs-r"><span class="arrow">&#8594;</span><span class="action">STORED</span></div>
</div>
`},

{act:1,t:"COIL WITH OUTPUT_INDEX",s:"Each rung carries a coil -- binds to output via output_index",h:`
<div class="desc">In TX_MLSC, every rung has its own coil. The critical field is <code>output_index</code> -- it specifies which transaction output this rung controls. Both rungs in our vault target output 0.</div>
<div class="card green">
<div class="card-t">Coil Metadata (both rungs)</div>
<div class="fs" style="background:#080808;margin-bottom:2px">
  <div class="fs-l" style="color:var(--ngreen)">coil_type</div>
  <div class="fs-m"><div class="hex">01</div><div class="note">UNLOCK -- standard spend</div></div>
</div>
<div class="fs" style="background:#080808;margin-bottom:2px">
  <div class="fs-l" style="color:var(--ngreen)">attestation</div>
  <div class="fs-m"><div class="hex">01</div><div class="note">INLINE -- signatures in witness</div></div>
</div>
<div class="fs" style="background:#080808;margin-bottom:2px">
  <div class="fs-l" style="color:var(--ngreen)">scheme</div>
  <div class="fs-m"><div class="hex">01</div><div class="note">SCHNORR</div></div>
</div>
<div class="fs" style="background:#080808;margin-bottom:2px">
  <div class="fs-l" style="color:var(--ngreen)">output_index</div>
  <div class="fs-m"><div class="hex">00</div><div class="note">Target: output 0</div></div>
</div>
<div class="fs" style="background:#080808">
  <div class="fs-l" style="color:#333">has_address</div>
  <div class="fs-m"><div class="note">0x00 -- no destination constraint</div></div>
</div>
</div>
<div class="co">ValidateCreationProof checks that every output has at least one rung assigned via output_index. Orphan outputs are rejected.</div>
`},

{act:1,t:"SERIALIZE STRUCTURAL TEMPLATE",s:"SerializeStructuralTemplate -> ~8 bytes per rung",h:`
<div class="desc"><code>SerializeStructuralTemplate()</code> encodes the <strong>public half</strong> of each rung: block types, inversion flags, and coil metadata. This is the part validated at creation time.</div>
<div class="sv">
<span class="lbl">Rung 0 template (~8 bytes)</span>
<span class="b s">01</span><span class="bn">n_blocks = 1</span><br>
<span class="b v">01 00</span><span class="bn">block_type = 0x0001 (SIG) -- uint16 LE</span>
<span class="b v">00</span><span class="bn">inverted = false</span><br>
<span class="b s">01</span><span class="bn">coil_type = UNLOCK</span>
<span class="b s">01</span><span class="bn">attestation = INLINE</span>
<span class="b s">01</span><span class="bn">scheme = SCHNORR</span>
<span class="b s">00</span><span class="bn">output_index = 0</span>
<span class="b s">00</span><span class="bn">has_address = false</span>
</div>
<div class="sv">
<span class="lbl">Rung 1 template (~11 bytes)</span>
<span class="b s">02</span><span class="bn">n_blocks = 2</span><br>
<span class="b v">01 00</span><span class="bn">SIG (0x0001)</span>
<span class="b v">00</span><span class="bn">not inverted</span>
<span class="b v">01 01</span><span class="bn">CSV (0x0101)</span>
<span class="b v">00</span><span class="bn">not inverted</span><br>
<span class="b s">01 01 01 00 00</span><span class="bn">coil: UNLOCK / INLINE / SCHNORR / out:0 / no addr</span>
</div>
`},

{act:1,t:"COMPUTE VALUE COMMITMENTS",s:"SHA256(field_values || pubkeys) -> 32 bytes each",h:`
<div class="desc"><code>ComputeValueCommitment()</code> hashes all field values from all blocks in layout order, then appends pubkeys. NUMERIC fields are normalized to 4-byte LE for consistent hashing regardless of original encoding.</div>
<div class="sv">
<span class="lbl">Rung 0: SHA256(SCHEME_value || pubkey_A)</span>
<span class="b v">01</span><span class="bn">SCHEME = SCHNORR (1 byte)</span>
<span style="color:#333;margin:0 .2rem">||</span>
<span class="b k">02 a3 f2 c8 ... 8d 01 b7 e5</span><span class="bn">33-byte pubkey</span>
</div>
<div class="ha">
<div class="fn">SHA256(1 + 33 = 34 bytes)</div>
<div class="ar">&#8595;</div>
</div>
<div class="leaf">
<div class="n">value_commitment_0</div>
<div class="h">0x7b2e...c4f1</div>
<div class="g">Opaque SHA-256 digest. Not attacker-chosen data.</div>
</div>

<div class="sv" style="margin-top:1rem">
<span class="lbl">Rung 1: SHA256(SCHEME_value || NUMERIC_value || pubkey_D)</span>
<span class="b v">10</span><span class="bn">SCHEME = FALCON512</span>
<span class="b v">F0 03 00 00</span><span class="bn">NUMERIC = 1008 (normalized to 4-byte LE)</span>
<span style="color:#333;margin:0 .2rem">||</span>
<span class="b k">d4 1a ... f7 02</span><span class="bn">897-byte FALCON key</span>
</div>
<div class="ha">
<div class="fn">SHA256(1 + 4 + 897 = 902 bytes)</div>
<div class="ar">&#8595;</div>
</div>
<div class="leaf">
<div class="n">value_commitment_1</div>
<div class="h">0x3d91...a8b2</div>
<div class="g">The 897-byte FALCON key, the SCHEME, the CSV timelock -- all compressed to 32 bytes.</div>
</div>
`},

{act:1,t:"COMPUTE TX_MLSC LEAVES",s:"TaggedHash('LadderLeaf', template || value_commitment)",h:`
<div class="desc"><code>ComputeTxMLSCLeaf()</code> combines the structural template and the value commitment into a single leaf via tagged hash. The LEAF_HASHER is a pre-computed copy of <code>TaggedHash("LadderLeaf")</code> prefix.</div>
<div class="sv">
<span class="lbl">Rung 0 leaf</span>
<span class="b s">01 01 00 00 01 01 01 00 00</span><span class="bn">structural_template (~8 bytes)</span>
<span style="color:#333;margin:0 .2rem">||</span>
<span class="b k">7b 2e ... c4 f1</span><span class="bn">value_commitment (32 bytes)</span>
</div>
<div class="ha">
<div class="fn">TaggedHash("LadderLeaf", ~40 bytes)</div>
<div class="ar">&#8595;</div>
</div>
<div class="leaf">
<div class="n">leaf_0</div>
<div class="h">0x4a8c...b3d7</div>
<div class="g">Rung 0: SIG Schnorr -- everyday spending path</div>
</div>

<div class="sv" style="margin-top:1rem">
<span class="lbl">Rung 1 leaf</span>
<span class="b s">02 01 00 00 01 01 00 01 01 01 00 00</span><span class="bn">structural_template (~11 bytes)</span>
<span style="color:#333;margin:0 .2rem">||</span>
<span class="b k">3d 91 ... a8 b2</span><span class="bn">value_commitment (32 bytes)</span>
</div>
<div class="ha">
<div class="fn">TaggedHash("LadderLeaf", ~43 bytes)</div>
<div class="ar">&#8595;</div>
</div>
<div class="leaf">
<div class="n">leaf_1</div>
<div class="h">0x91e5...20ac</div>
<div class="g">Rung 1: FALCON512 + CSV 1008 -- quantum-safe recovery</div>
</div>
`},

{act:1,t:"BUILD SHARED MERKLE TREE",s:"ComputeTxMLSCRoot -- sorted interior nodes, power-of-2 padding",h:`
<div class="desc"><code>ComputeTxMLSCRoot()</code> collects all rung leaves (no separate coil leaf -- the coil is embedded in each rung's template), pads to next power of 2 with <code>MLSC_EMPTY_LEAF</code>, and builds the tree with sorted interior nodes.</div>
<div style="display:flex;gap:.5rem;margin:.75rem 0;flex-wrap:wrap">
<div class="leaf" style="flex:1;min-width:150px"><div class="n">leaves[0]</div><div class="h" style="font-size:.7rem">0x4a8c...b3d7</div><div class="g">Rung 0 -- SIG Schnorr</div></div>
<div class="leaf" style="flex:1;min-width:150px"><div class="n">leaves[1]</div><div class="h" style="font-size:.7rem">0x91e5...20ac</div><div class="g">Rung 1 -- FALCON + CSV</div></div>
</div>
<div class="desc" style="font-size:.72rem;color:#555"><code>NextPowerOf2(2) = 2</code> -- already a power of 2, no padding needed. Interior hashing: sort children lexicographically, then <code>TaggedHash("LadderInternal", min(a,b) || max(a,b))</code>.</div>
<div class="sv">
<span class="lbl">Root</span>
<span class="b v">conditions_root</span> = TaggedHash("LadderInternal", sorted(leaf_0, leaf_1))
</div>
<div class="desc" style="font-size:.72rem;color:#555;margin-top:.5rem"><strong style="color:#fff">Domain separation:</strong> Leaf tag = "LadderLeaf", Interior tag = "LadderInternal". A valid leaf hash can NEVER collide with a valid interior hash. This follows BIP-341 (Taproot) convention.</div>
`},

  <text x="350" y="45" text-anchor="middle" fill="#333" font-size="7">32 bytes -- shared across all outputs</text>

  <rect x="55" y="120" width="260" height="52" rx="5" fill="#050505" stroke="#00d4ff" stroke-width="1.5"/>

</svg>

{act:1,t:"CREATION PROOF IN WITNESS",s:"Templates + value_commitments -- validated at block acceptance",h:`
<div class="desc">The creation proof is serialized into the transaction witness. It carries the structural templates and opaque value commitments for every rung. Nodes validate this at block acceptance time.</div>
<div class="sv">
<span class="lbl">SerializeCreationProof -- wire format</span>
<span class="b s">02</span><span class="bn">n_rungs = 2</span><br>
<span class="b v">01</span><span class="bn">rung 0: n_blocks = 1</span>
<span class="b v">01 00 00</span><span class="bn">SIG (0x0001) + not inverted</span>
<span class="b v">01 01 01 00 00</span><span class="bn">coil: UNLOCK/INLINE/SCHNORR/out:0/no_addr</span>
<span class="b k">7b 2e ... c4 f1</span><span class="bn">value_commitment_0 (32 bytes)</span><br>
<span class="b v">02</span><span class="bn">rung 1: n_blocks = 2</span>
<span class="b v">01 00 00</span><span class="bn">SIG + not inverted</span>
<span class="b v">01 01 00</span><span class="bn">CSV + not inverted</span>
<span class="b v">01 01 01 00 00</span><span class="bn">coil: UNLOCK/INLINE/SCHNORR/out:0/no_addr</span>
<span class="b k">3d 91 ... a8 b2</span><span class="bn">value_commitment_1 (32 bytes)</span>
</div>
<div class="card blue">
<div class="card-t">ValidateCreationProof checks</div>
<div class="chk ok"><span class="ic">&#10003;</span> All block types known: SIG (0x0001), CSV (0x0101)</div>
<div class="chk ok"><span class="ic">&#10003;</span> Inversion flags valid: 0 on all blocks</div>
<div class="chk ok"><span class="ic">&#10003;</span> Coil types known: UNLOCK, INLINE</div>
<div class="chk ok"><span class="ic">&#10003;</span> output_index < n_outputs: 0 < 1</div>
<div class="chk ok"><span class="ic">&#10003;</span> Every output covered: output 0 has rungs 0 and 1</div>
<div class="chk ok"><span class="ic">&#10003;</span> ComputeTxMLSCRoot(proof) == tx.conditions_root</div>
</div>
`},

{act:1,t:"OUTPUT FORMAT",s:"8 bytes per output + one shared conditions_root per tx",h:`
<div class="out">
<div class="pre">TX_MLSC output</div>
<div class="val">8 bytes (value only)</div>
<div class="sz">One conditions_root (0xDF + 32 bytes = 33 bytes) shared per transaction.<br>Total on-chain: ~112 bytes per tx regardless of conditions complexity.</div>
<div class="msg">
This is <strong>everything</strong> on-chain at creation.<br>
Zero conditions. Zero public keys. Zero block types. Zero timelocks.<br>
The 33-byte Schnorr key, the 897-byte FALCON key, the CSV timelock --<br>
all inside SHA-256 leaf digests. <strong>Irrecoverable.</strong>
</div>
</div>
`},

{act:1,t:"ANTI-SPAM PROPERTIES",s:"Protocol-derived root / typed fields / ~112 bytes per tx",h:`
<div class="card green">
<div class="card-t">Anti-spam surface at creation</div>
<div class="chk ok"><span class="ic">&#10003;</span> conditions_root: protocol-derived from validated structural templates -- NOT attacker-chosen</div>
<div class="chk ok"><span class="ic">&#10003;</span> value_commitments: SHA-256 hash outputs -- NOT raw attacker data</div>
<div class="chk ok"><span class="ic">&#10003;</span> Structural templates: only block_type(uint16) + inverted(uint8) + coil fields -- typed, bounded</div>
<div class="chk ok"><span class="ic">&#10003;</span> No PUBKEY_COMMIT field -- pubkeys folded into value_commitment hash</div>
<div class="chk ok"><span class="ic">&#10003;</span> MIN_RUNG_OUTPUT_VALUE = 546 sats -- prevents dust UTXO bloat</div>
<div class="chk ok"><span class="ic">&#10003;</span> MAX_PREIMAGE_FIELDS_PER_TX = 2 -- across ALL inputs</div>
</div>
<div class="desc" style="font-size:.72rem;color:#555">Total on-chain footprint: ~112 bytes. The same size whether the vault has 1 rung with 1 block or 16 rungs with 8 blocks each, PQ keys, timelocks, hash locks, and relays.</div>
`},

{act:1,t:"WHAT GOES WHERE",s:"UTXO set / Blockchain / Wallet",h:`
<div class="where-grid">
<div class="where-box" style="border-color:rgba(0,255,136,.2)">
  <div class="wt">UTXO Set</div>
  <div class="wv" style="color:var(--ngreen)">40 bytes</div>
  <div class="ws">value (8 bytes int64) + conditions_root (32 bytes)</div>
  <div class="ws" style="margin-top:.3rem;color:#555">Same size for single-sig or 16-rung PQ vault</div>
</div>
<div class="where-box" style="border-color:rgba(0,212,255,.2)">
  <div class="wt">Blockchain (in block)</div>
  <div class="wv" style="color:var(--nblue)">~112 bytes</div>
  <div class="ws">Outputs (8 bytes each) + 0xDF + root (33 bytes) + creation proof (witness, prunable)</div>
</div>
</div>
<div class="where-grid">
<div class="where-box" style="border-color:rgba(255,136,0,.2)">
  <div class="wt">Wallet (off-chain)</div>
  <div class="wv" style="color:var(--norange)">Full conditions + pubkeys</div>
  <div class="ws">Stored locally. Needed to spend. If lost, UTXO is unspendable.</div>
</div>
<div class="where-box" style="border-color:rgba(179,102,255,.2)">
  <div class="wt">NOT on-chain</div>
  <div class="wv" style="color:var(--npurple)">Everything else</div>
  <div class="ws">Pubkeys, schemes, timelocks, block types, coil details -- all hidden until spend.</div>
</div>
</div>
`},

// ============================================================================
// ACT 2: SPEND (VERIFY)
// ============================================================================

{act:2,t:"SPENDING TRANSACTION",s:"Witness stack: exactly 2 elements",h:`
<div class="desc">A new v4 transaction spends the UTXO. The input's witness has exactly <strong>2 stack elements</strong>:</div>
<div class="card orange">
<div class="card-t">stack[0] -- LadderWitness</div>
<div class="desc" style="margin-bottom:0;font-size:.72rem">The unlock data: pubkeys, signatures, preimages for the one rung being spent. Exactly 1 rung (single rung rule).</div>
</div>
<div class="card orange">
<div class="card-t">stack[1] -- MLSCProof</div>
<div class="desc" style="margin-bottom:0;font-size:.72rem">The revealed rung's conditions + proof hashes for unrevealed leaves. Contains total_rungs, rung_index, revealed_rung, proof_hashes.</div>
</div>
<div class="desc" style="margin-top:.5rem;font-size:.72rem;color:#555">The node doesn't know which rung is being spent until it deserializes these. Let's trace <strong>spending via Rung 0</strong> (Schnorr).</div>
`},

{act:2,t:"DESERIALIZE & ANTI-SPAM",s:"Size gate / witness stack enforcement / preimage count",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(255,136,0,.1);color:var(--norange)">1</div><div class="stg-t">DeserializeLadderWitness</div></div>
<div class="chk ok"><span class="ic">&#10003;</span> Size &le; MAX_LADDER_WITNESS_SIZE (100,000 bytes)</div>
<div class="chk ok"><span class="ic">&#10003;</span> n_rungs = 1 (&le; MAX_RUNGS = 16)</div>
<div class="chk ok"><span class="ic">&#10003;</span> n_blocks = 1 (&le; MAX_BLOCKS_PER_RUNG = 8)</div>
<div class="chk ok"><span class="ic">&#10003;</span> witness.stack.size() == 2 (exactly LadderWitness + MLSCProof)</div>
</div>
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(255,136,0,.1);color:var(--norange)">2</div><div class="stg-t">Anti-spam gates</div></div>
<div class="chk ok"><span class="ic">&#10003;</span> CountTxPreimageFields(tx) &le; MAX_PREIMAGE_FIELDS_PER_TX (2)</div>
<div class="chk ok"><span class="ic">&#10003;</span> Single rung rule: witness_ladder.rungs.size() == 1</div>
<div class="chk ok"><span class="ic">&#10003;</span> No trailing bytes in witness data</div>
</div>
`},

{act:2,t:"MLSC DETECTION",s:"0xDF prefix / extract conditions_root from UTXO",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(0,255,136,.1);color:var(--ngreen)">3</div><div class="stg-t">IsMLSCScript + GetMLSCRoot</div></div>
<div class="chk ok"><span class="ic">&#10003;</span> scriptPubKey[0] = 0xDF (RUNG_MLSC_PREFIX)</div>
<div class="chk ok"><span class="ic">&#10003;</span> scriptPubKey.size() within [33, 73] (standard or with DATA_RETURN)</div>
<div class="chk ok"><span class="ic">&#10003;</span> Extract bytes 1-32 -> conditions_root (the expected Merkle root)</div>
</div>
<div class="desc" style="font-size:.72rem;color:#555">This is the root that was committed at creation time. The verifier will rebuild the tree from the revealed data and check it matches.</div>
`},

{act:2,t:"VALIDATE CREATION PROOF",s:"Structural templates checked for new outputs",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(0,255,136,.1);color:var(--ngreen)">4</div><div class="stg-t">Creation proof validation (new outputs)</div></div>
<div class="desc" style="font-size:.72rem;margin-bottom:.3rem">If the spending transaction creates new TX_MLSC outputs, VerifyRungTx validates its creation proof first -- checking structural templates, block types, output coverage, and root match.</div>
<div class="chk ok"><span class="ic">&#10003;</span> DeserializeCreationProof(tx.creation_proof)</div>
<div class="chk ok"><span class="ic">&#10003;</span> ValidateCreationProof(proof, tx.conditions_root, n_spendable)</div>
<div class="chk ok"><span class="ic">&#10003;</span> Dust threshold: every output &ge; MIN_RUNG_OUTPUT_VALUE (546 sats)</div>
</div>
`},

{act:2,t:"MLSC PROOF DESERIALIZATION",s:"total_rungs / rung_index / revealed rung / proof hashes",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(179,102,255,.1);color:var(--npurple)">5</div><div class="stg-t">DeserializeMLSCProof -- from stack[1]</div></div>
<div class="chk ok"><span class="ic">&#10003;</span> total_rungs = 2 -- within [1, MAX_RUNGS=16]</div>
<div class="chk ok"><span class="ic">&#10003;</span> total_relays = 0 -- within [0, MAX_RELAYS=8]</div>
<div class="chk ok"><span class="ic">&#10003;</span> rung_index = 0 -- less than total_rungs (2)</div>
<div class="chk ok"><span class="ic">&#10003;</span> Revealed rung: 1 SIG block, CONDITIONS context -- SCHEME = 0x01 (SCHNORR)</div>
<div class="chk ok"><span class="ic">&#10003;</span> n_proof_hashes = 1 (one unrevealed rung)</div>
<div class="chk ok"><span class="ic">&#10003;</span> proof_hash[0] = 0x91e5...20ac (rung 1's leaf -- opaque)</div>
</div>
<div class="co">Rung 1 stays hidden. This 32-byte proof hash is a leaf digest. It contains the 897-byte FALCON key and the CSV timelock -- but nobody can extract them.</div>
`},

{act:2,t:"BUILD CREATION PROOF RUNG",s:"Reconstruct leaf from revealed rung + witness pubkeys",h:`
<div class="desc">The verifier builds a <code>CreationProofRung</code> from the revealed data: block types from the MLSCProof, coil from the witness, and a freshly computed value_commitment from the revealed conditions + witness pubkeys.</div>
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(0,212,255,.1);color:var(--nblue)">6</div><div class="stg-t">Rebuild CreationProofRung</div></div>
<div class="chk ok"><span class="ic">&#10003;</span> cp_rung.blocks = [(SIG/0x0001, inverted=0)] -- from mlsc_proof.revealed_rung</div>
<div class="chk ok"><span class="ic">&#10003;</span> cp_rung.coil = witness_ladder.coil -- from stack[0]</div>
<div class="chk ok"><span class="ic">&#10003;</span> ExtractBlockPubkeys(witness blocks) -> [33-byte pubkey_A]</div>
<div class="chk ok"><span class="ic">&#10003;</span> cp_rung.value_commitment = ComputeValueCommitment(revealed_rung, [pubkey_A])</div>
</div>
<div class="desc" style="font-size:.72rem;color:#555">The value_commitment is recomputed from the revealed conditions and witness pubkeys. If the attacker changed any field value or swapped a pubkey, this hash would differ, and leaf verification would fail.</div>
`},

{act:2,t:"VERIFY COIL OUTPUT_INDEX",s:"coil.output_index must match the spent output",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(0,255,136,.1);color:var(--ngreen)">7</div><div class="stg-t">Output binding check</div></div>
<div class="chk ok"><span class="ic">&#10003;</span> witness_ladder.coil.output_index = 0</div>
<div class="chk ok"><span class="ic">&#10003;</span> tx.vin[nIn].prevout.n = 0 (spent output vout)</div>
<div class="chk ok"><span class="ic">&#10003;</span> output_index == spent_vout -- MATCH</div>
</div>
<div class="desc" style="font-size:.72rem;color:#555">This is the PLC binding: the coil's output_index (embedded in the leaf via the structural template) must match the actual output being spent. A rung targeting output 1 cannot be used to spend output 0.</div>
`},

{act:2,t:"WALK PROOF TO ROOT",s:"Compute leaf / fill unrevealed / build tree / verify root",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(0,255,136,.1);color:var(--ngreen)">8</div><div class="stg-t">Merkle tree verification</div></div>
<div class="chk ok"><span class="ic">&#10003;</span> my_leaf = ComputeTxMLSCLeaf(cp_rung) -- TaggedHash("LadderLeaf", template || vc)</div>
<div class="chk ok"><span class="ic">&#10003;</span> total_leaves = total_rungs = 2</div>
<div class="chk ok"><span class="ic">&#10003;</span> leaves[0] = my_leaf (rung_index = 0 -- recomputed)</div>
<div class="chk ok"><span class="ic">&#10003;</span> leaves[1] = proof_hashes[0] = 0x91e5...20ac (unrevealed)</div>
<div class="chk ok"><span class="ic">&#10003;</span> BuildMerkleTree(leaves) -> computed_root</div>
<div class="chk ok"><span class="ic" style="font-size:.6rem">&#10003;</span><span style="font-weight:700"> computed_root == conditions_root -- MATCH</span></div>
</div>
<div class="desc" style="font-size:.72rem;color:#555;margin-top:.5rem"><strong style="color:#fff">This is the binding:</strong> if the attacker changed the pubkey, the value_commitment changes, the leaf hash changes, the root changes, verification fails. The Merkle tree IS the commitment.</div>
`},

{act:2,t:"EVALUATE RUNG BLOCKS",s:"Conditions + witness merged / SIG evaluator / result",h:`
<div class="stg">
<div class="stg-h"><div class="stg-n" style="background:rgba(0,255,136,.1);color:var(--ngreen)">9</div><div class="stg-t">Merge & Evaluate</div></div>
<div class="desc" style="font-size:.72rem;margin-bottom:.3rem">Conditions (from MLSCProof: SCHEME) merged with witness (PUBKEY + SIGNATURE). Pubkeys trusted directly -- Merkle proof already verified they match creation.</div>
<div class="chk ok"><span class="ic">&#10003;</span> Block count matches: conditions 1 block == witness 1 block</div>
<div class="chk ok"><span class="ic">&#10003;</span> Block type matches: SIG == SIG</div>
<div class="chk ok"><span class="ic">&#10003;</span> Merged block: [{SCHEME, 0x01}, {PUBKEY, 33B}, {SIGNATURE, 64B}]</div>
<div class="chk ok"><span class="ic">&#10003;</span> EvalSigBlock: SCHEME=SCHNORR -> Schnorr verification path</div>
<div class="chk ok"><span class="ic">&#10003;</span> Extract x-only key from compressed pubkey (strip prefix byte)</div>
<div class="chk ok"><span class="ic">&#10003;</span> CheckSchnorrSignature(sig, xonly_key) -> VALID</div>
<div class="chk ok"><span class="ic">&#10003;</span> Rung 0: all blocks SATISFIED (1/1)</div>
<div class="chk ok"><span class="ic">&#10003;</span> EvalLadder: first satisfied rung found -> TRUE</div>
</div>
<div class="result">
<h3>SPEND VALID</h3>
<p>Rung 1 (FALCON-512 + CSV recovery) was never revealed.</p>
<div class="dim">An observer sees one 32-byte proof hash. They cannot determine the recovery path's structure, keys, scheme, or timelock.</div>
</div>
`},

{act:2,t:"PRIVACY SUMMARY",s:"What the blockchain sees at each stage",h:`
<div class="where-grid">
<div class="where-box" style="border-color:rgba(0,255,136,.2)">
  <div class="wt">At creation</div>
  <div class="wv" style="color:var(--ngreen);font-size:.75rem">0xDF || root + 8-byte values</div>
  <div class="ws">~112 bytes. Zero information about conditions.</div>
</div>
<div class="where-box" style="border-color:rgba(255,136,0,.2)">
  <div class="wt">At spend (Rung 0)</div>
  <div class="wv" style="color:var(--norange);font-size:.75rem">SIG + pubkey + sig + coil</div>
  <div class="ws">Observer learns: Schnorr key controlled funds at output 0.</div>
</div>
</div>
<div class="where-grid">
<div class="where-box" style="border-color:rgba(179,102,255,.2)">
  <div class="wt">Hidden forever</div>
  <div class="wv" style="color:var(--npurple);font-size:.75rem">Rung 1</div>
  <div class="ws">FALCON512 key, CSV timelock -- represented by one 32-byte hash, indistinguishable from random.</div>
</div>
<div class="where-box" style="border-color:rgba(255,34,68,.2)">
  <div class="wt">Cannot be embedded</div>
  <div class="wv" style="color:var(--nred);font-size:.75rem">Arbitrary data</div>
  <div class="ws">No PUBKEY_COMMIT field. Value commitments are SHA-256 outputs. Templates are typed & validated. Root is protocol-derived.</div>
</div>
</div>
`},

];

// Act metadata
const acts = [
  {name:"WHAT IS TX_MLSC",color:"var(--nblue)"},
  {name:"FUND",color:"var(--ngreen)"},
  {name:"SPEND",color:"var(--norange)"}
];
const actLabels = ["TX_MLSC","FUND","SPEND"];

let cur = 0;
const N = S.length;

function render(){
  const s = S[cur];
  // Tabs
  let tabs = '';
  for(let a=0;a<3;a++){
    const on = s.act===a?'on':'';
    tabs+=`<button class="act-tab ${on}" data-a="${a}" onclick="goAct(${a})">${actLabels[a]}</button>`;
  }
  document.getElementById('atabs').innerHTML=tabs;
  // Progress
  document.getElementById('pbar').style.width=((cur+1)/N*100)+'%';
  document.getElementById('pbar').style.background=acts[s.act].color;
  document.getElementById('ct').textContent=(cur+1)+'/'+N;
  document.getElementById('pb').disabled=cur===0;
  document.getElementById('nb').disabled=cur===N-1;
  // Scene
  document.getElementById('root').innerHTML=`
    <div class="scene on">
      <div class="act-label" style="color:${acts[s.act].color}">ACT ${s.act}: ${acts[s.act].name}</div>
      <div class="title">${s.t}</div>
      <div class="sub">${s.s}</div>
      ${s.h}
    </div>`;
}

function goTo(i){cur=Math.max(0,Math.min(N-1,i));render();}
function next(){goTo(cur+1);}
function prev(){goTo(cur-1);}
function goAct(a){
  for(let i=0;i<N;i++){if(S[i].act===a){goTo(i);return;}}
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'){e.preventDefault();prev();}
});

render();
</script>
